<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Classeur · Fiches de révision partagées</title>

<!-- Rendu Markdown + nettoyage anti-injection -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.0/purify.min.js"></script>
<!-- Import Word (.docx), conversion HTML→Markdown, Excel (.xlsx), et PowerPoint (.pptx) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turndown/7.1.2/turndown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- Polices -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#EAECEF;
    --surface:#FFFFFF;
    --ink:#1A2236;
    --ink-soft:#5A6478;
    --ink-faint:#9AA2B1;
    --accent:#3A4FC4;
    --line:#DDE0E6;
    --line-strong:#C9CDD6;
    --danger:#C8463E;
    --radius:14px;
    --shadow:0 1px 2px rgba(26,34,54,.06), 0 6px 18px rgba(26,34,54,.07);
    --shadow-lift:0 4px 8px rgba(26,34,54,.10), 0 14px 34px rgba(26,34,54,.13);
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', system-ui, sans-serif;
    --font-mono:'Space Mono', monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:
      linear-gradient(var(--bg),var(--bg)),
      repeating-linear-gradient(transparent, transparent 31px, rgba(58,79,196,.05) 32px);
    background-attachment:fixed;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- En-tête ---------- */
  header.top{
    position:sticky; top:0; z-index:40;
    background:rgba(234,236,239,.86);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-strong);
  }
  .top-inner{
    max-width:1120px; margin:0 auto;
    padding:18px 24px 0;
    display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:baseline; gap:12px;}
  .brand .mark{
    font-family:var(--font-display); font-weight:700; font-size:30px; letter-spacing:-.01em;
    line-height:1; color:var(--ink);
  }
  .brand .mark em{font-style:italic; color:var(--accent);}
  .brand .sub{
    font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:.12em;
    color:var(--ink-soft); padding-bottom:2px;
  }
  .whoami{
    display:flex; align-items:center; gap:8px;
    font-family:var(--font-mono); font-size:12px; color:var(--ink-soft);
  }
  .whoami button{
    font-family:var(--font-mono); font-size:12px; color:var(--accent);
    background:none; border:none; cursor:pointer; padding:0; text-decoration:underline; text-underline-offset:2px;
  }

  /* ---------- Onglets ECF (intercalaires) ---------- */
  .tabs{
    max-width:1120px; margin:0 auto; padding:14px 24px 0;
    display:flex; gap:4px; overflow-x:auto; scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    font-family:var(--font-body); font-size:13px; font-weight:600;
    color:var(--ink-soft);
    background:var(--surface);
    border:1px solid var(--line); border-bottom:none;
    padding:9px 15px; border-radius:9px 9px 0 0;
    cursor:pointer; white-space:nowrap;
    display:flex; align-items:center; gap:7px;
    transition:color .15s, background .15s;
    position:relative; top:1px;
  }
  .tab:hover{color:var(--ink);}
  .tab .dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto;}
  .tab .count{
    font-family:var(--font-mono); font-size:10px; color:var(--ink-faint);
    background:var(--bg); border-radius:20px; padding:1px 7px;
  }
  .tab.active{
    color:var(--ink); background:var(--surface);
    border-color:var(--line-strong);
    box-shadow:0 -3px 10px rgba(26,34,54,.05);
  }
  .tab.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:3px;
    background:var(--tab-color, var(--accent));
    border-radius:2px 2px 0 0;
  }

  /* ---------- Barre d'outils ---------- */
  .toolbar{
    background:var(--surface);
    border-top:1px solid var(--line-strong);
    border-bottom:1px solid var(--line-strong);
  }
  .toolbar-inner{
    max-width:1120px; margin:0 auto; padding:12px 24px;
    display:flex; gap:12px; align-items:center;
  }
  .search{
    flex:1; display:flex; align-items:center; gap:9px;
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:9px 13px; min-width:0;
  }
  .search svg{flex:0 0 auto; color:var(--ink-faint);}
  .search input{
    border:none; background:none; outline:none; width:100%;
    font-family:var(--font-body); font-size:14px; color:var(--ink);
  }
  .search input::placeholder{color:var(--ink-faint);}
  .btn{
    font-family:var(--font-body); font-weight:600; font-size:14px;
    border-radius:10px; padding:10px 16px; cursor:pointer; border:1px solid transparent;
    display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
    transition:transform .12s, box-shadow .15s, background .15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:#2f41a8; box-shadow:0 4px 14px rgba(58,79,196,.32);}
  .btn-ghost{background:var(--surface); color:var(--ink); border-color:var(--line-strong);}
  .btn-ghost:hover{border-color:var(--ink-soft);}
  .btn-danger{background:none; color:var(--danger); border-color:transparent;}
  .btn-danger:hover{background:#FBEAE8;}

  /* ---------- Bannière statut ---------- */
  .banner{max-width:1120px; margin:14px auto 0; padding:0 24px;}
  .banner-card{
    border-radius:12px; padding:13px 16px; font-size:13px; line-height:1.5;
    display:flex; gap:11px; align-items:flex-start;
  }
  .banner-demo{background:#FFF6E5; border:1px solid #F2D58A; color:#7A5A12;}
  .banner-live{background:#E7F6EE; border:1px solid #A6DCBF; color:#1C6B41;}
  .banner-card b{font-weight:700;}
  .banner-card .bdot{width:9px; height:9px; border-radius:50%; margin-top:4px; flex:0 0 auto;}

  /* ---------- Grille de fiches ---------- */
  main{max-width:1120px; margin:0 auto; padding:22px 24px 80px;}
  .grid{
    display:grid; gap:16px;
    grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
  }
  .card{
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); box-shadow:var(--shadow);
    padding:18px 18px 16px 22px; cursor:pointer;
    position:relative; overflow:hidden;
    transition:transform .15s, box-shadow .18s, border-color .15s;
    animation:rise .4s cubic-bezier(.2,.7,.3,1) backwards;
  }
  .card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:6px;
    background:var(--card-color, var(--accent));
  }
  .card:hover{transform:translateY(-3px); box-shadow:var(--shadow-lift); border-color:var(--line-strong);}
  .card .chip{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--card-color, var(--accent)); font-weight:700; margin-bottom:9px;
  }
  .card .chip .dot{width:7px; height:7px; border-radius:50%; background:currentColor;}
  .card .chip .theme{color:var(--ink-faint); font-weight:400; text-transform:none; letter-spacing:0;}
  .card h3{
    font-family:var(--font-display); font-weight:600; font-size:19px; line-height:1.25;
    margin:0 0 8px; color:var(--ink); letter-spacing:-.01em;
  }
  .card .preview{
    font-size:13.5px; line-height:1.55; color:var(--ink-soft);
    display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card .meta{
    margin-top:14px; padding-top:11px; border-top:1px dashed var(--line);
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--font-mono); font-size:11px; color:var(--ink-faint);
  }
  .card .meta .author{color:var(--ink-soft);}
  @keyframes rise{from{opacity:0; transform:translateY(10px);}to{opacity:1; transform:translateY(0);}}

  /* ---------- État vide ---------- */
  .empty{text-align:center; padding:70px 20px; color:var(--ink-soft);}
  .empty .big{font-family:var(--font-display); font-size:24px; color:var(--ink); margin-bottom:8px; font-weight:600;}
  .empty p{margin:0 0 20px; font-size:14px;}

  /* ---------- Modales ---------- */
  .overlay{
    position:fixed; inset:0; z-index:60;
    background:rgba(26,34,54,.42); backdrop-filter:blur(3px);
    display:flex; align-items:flex-start; justify-content:center;
    padding:48px 18px; overflow-y:auto;
    animation:fade .18s ease;
  }
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{
    background:var(--surface); border-radius:18px; width:100%; max-width:660px;
    box-shadow:0 24px 70px rgba(26,34,54,.3); overflow:hidden;
    animation:pop .22s cubic-bezier(.2,.8,.3,1);
  }
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.98);}to{opacity:1; transform:none;}}
  .modal-head{
    padding:20px 24px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .modal-head h2{font-family:var(--font-display); font-weight:600; font-size:21px; margin:0; letter-spacing:-.01em;}
  .modal-body{padding:22px 24px;}
  .x{background:none; border:none; cursor:pointer; color:var(--ink-faint); padding:4px; line-height:0; border-radius:8px;}
  .x:hover{color:var(--ink); background:var(--bg);}

  label.field{display:block; margin-bottom:16px;}
  label.field > span, .field-label{
    display:block; font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
    letter-spacing:.08em; color:var(--ink-soft); margin-bottom:6px;
  }
  .input, textarea.input{
    width:100%; font-family:var(--font-body); font-size:14px; color:var(--ink);
    background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:11px 13px;
    outline:none; transition:border-color .15s, background .15s;
  }
  .input:focus, textarea.input:focus{border-color:var(--accent); background:#fff;}
  textarea.input{resize:vertical; min-height:200px; line-height:1.55; font-size:14px;}
  .hint{font-family:var(--font-mono); font-size:10.5px; color:var(--ink-faint); margin-top:5px;}
  .modal-foot{
    padding:16px 24px; border-top:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center; gap:12px;
  }
  .modal-foot .right{display:flex; gap:10px;}

  /* ---------- Sélecteur ECF (pills) ---------- */
  .ecf-pick{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .ecf-pill{
    font-family:var(--font-body); font-weight:600; font-size:13px;
    border:1.5px solid var(--line-strong); background:var(--surface); color:var(--ink-soft);
    border-radius:10px; padding:9px 16px; cursor:pointer;
    display:flex; align-items:center; gap:8px; transition:all .14s;
  }
  .ecf-pill .dot{width:9px; height:9px; border-radius:50%; background:var(--ec); opacity:.4; transition:opacity .14s;}
  .ecf-pill:hover{border-color:var(--ec);}
  .ecf-pill.on{color:#fff; background:var(--ec); border-color:var(--ec);}
  .ecf-pill.on .dot{background:#fff; opacity:1;}

  /* ---------- Zone d'import ---------- */
  .import-zone{
    border:1.5px dashed var(--line-strong); border-radius:12px;
    padding:14px 16px; margin-bottom:16px; background:var(--bg);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .import-zone .txt{flex:1; min-width:160px; font-size:13px; color:var(--ink-soft); line-height:1.45;}
  .import-zone .txt b{color:var(--ink);}
  .import-status{font-family:var(--font-mono); font-size:11px; color:var(--accent); margin-top:5px; display:block;}

  /* ---------- Pièces jointes ---------- */
  .attach-row{display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--bg); border:1px solid var(--line); border-radius:10px;}
  .attach-ic{font-size:18px; flex:0 0 auto; line-height:1;}
  .attach-name{flex:1; min-width:0; font-size:13.5px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .attach-box{margin-top:18px; padding-top:14px; border-top:1px dashed var(--line); display:flex; align-items:center; gap:10px; flex-wrap:wrap;}

  /* ---------- Lecture d'une fiche ---------- */
  .read-meta{
    font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); margin-bottom:18px;
    display:flex; gap:14px; flex-wrap:wrap; align-items:center;
  }
  .read-meta .chip{
    display:inline-flex; align-items:center; gap:6px; font-weight:700;
    text-transform:uppercase; letter-spacing:.08em; color:var(--card-color,var(--accent));
  }
  .read-meta .chip .dot{width:8px; height:8px; border-radius:50%; background:currentColor;}
  .content{font-size:15px; line-height:1.7; color:var(--ink);}
  .content h1,.content h2,.content h3{font-family:var(--font-display); line-height:1.3; margin:22px 0 10px;}
  .content h1{font-size:23px;} .content h2{font-size:20px;} .content h3{font-size:17px;}
  .content p{margin:0 0 13px;}
  .content ul,.content ol{margin:0 0 13px; padding-left:22px;}
  .content li{margin-bottom:5px;}
  .content code{font-family:var(--font-mono); font-size:13px; background:var(--bg); padding:2px 6px; border-radius:5px;}
  .content pre{background:var(--ink); color:#E8EBF5; padding:14px 16px; border-radius:10px; overflow-x:auto;}
  .content pre code{background:none; color:inherit; padding:0;}
  .content blockquote{border-left:3px solid var(--line-strong); margin:0 0 13px; padding:2px 0 2px 16px; color:var(--ink-soft);}
  .content table{border-collapse:collapse; width:100%; margin:0 0 13px; font-size:13.5px;}
  .content th,.content td{border:1px solid var(--line); padding:7px 10px; text-align:left;}
  .content th{background:var(--bg); font-weight:600;}
  .content a{color:var(--accent);}

  /* ---------- Journal d'activité ---------- */
  .act-btn{position:relative;}
  .act-badge{
    position:absolute; top:-7px; right:-7px;
    background:#E0524C; color:#fff; font-family:var(--font-mono); font-size:10px; font-weight:700;
    min-width:18px; height:18px; border-radius:10px; padding:0 5px;
    display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(0,0,0,.2);
  }
  .log-legend{
    font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);
    display:flex; gap:7px; align-items:center; margin-bottom:14px;
  }
  .log-legend .sw{width:13px; height:13px; border-radius:4px; background:#FFF4D6; border:1px solid #E9D285;}
  .log-list{display:flex; flex-direction:column;}
  .log-item{
    display:flex; gap:12px; align-items:flex-start;
    padding:12px 10px; border-bottom:1px solid var(--line); border-radius:8px;
    transition:background .2s;
  }
  .log-item:last-child{border-bottom:none;}
  .log-item.new{background:#FFF4D6;}
  .log-ic{
    width:30px; height:30px; border-radius:8px; flex:0 0 auto; color:#fff;
    display:flex; align-items:center; justify-content:center;
  }
  .log-tx{font-size:13.5px; color:var(--ink); line-height:1.45; flex:1; min-width:0;}
  .log-tx b{font-weight:600;}
  .log-tx .ti{font-style:italic; color:var(--ink-soft);}
  .log-ecf{
    font-family:var(--font-mono); font-size:10px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--ink-faint); margin-left:5px;
  }
  .log-time{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:3px;}

  /* ---------- Import en masse ---------- */
  .imp-list{display:flex; flex-direction:column; gap:6px; margin:14px 0 4px; max-height:260px; overflow-y:auto;}
  .imp-row{
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:9px;
  }
  .imp-ic{
    font-family:var(--font-mono); font-size:9px; font-weight:700; color:#fff;
    padding:3px 6px; border-radius:5px; flex:0 0 auto;
  }
  .imp-name{flex:1; min-width:0; font-size:13px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .imp-sel{
    font-family:var(--font-body); font-size:12px; color:var(--ink); flex:0 0 auto;
    border:1px solid var(--line-strong); border-radius:7px; padding:5px 7px; background:var(--surface); cursor:pointer;
  }
  .imp-row.done{opacity:.5;}
  .imp-row.fail{border-color:var(--danger);}

  @media (max-width:560px){
    .top-inner{padding:14px 16px 0;}
    .brand .mark{font-size:24px;}
    .brand .sub{display:none;}
    .tabs,.toolbar-inner,main,.banner{padding-left:16px; padding-right:16px;}
    .toolbar-inner{flex-wrap:wrap;}
    .btn-primary{flex:1; justify-content:center;}
    .grid{grid-template-columns:1fr;}
    .modal-foot{flex-direction:column-reverse; align-items:stretch;}
    .modal-foot .right{flex-direction:column;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <span class="mark">Le <em>Classeur</em></span>
      <span class="sub">Fiches partagées</span>
    </div>
    <div class="whoami">
      <span id="whoLabel">—</span>
      <button id="changeName">changer</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Rechercher un titre, un mot-clé…" autocomplete="off">
    </div>
    <button class="btn btn-ghost act-btn" id="actBtn" title="Voir l'activité récente">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/></svg>
      Activité
      <span class="act-badge" id="actBadge" hidden></span>
    </button>
    <button class="btn btn-ghost" id="importBtn" title="Importer plusieurs fichiers d'un coup">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      Importer
    </button>
    <button class="btn btn-primary" id="newCard">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
      Nouvelle fiche
    </button>
  </div>
</div>

<div class="banner" id="bannerWrap"></div>

<main>
  <div class="grid" id="grid"></div>
</main>

<script type="module">
/* =========================================================================
   1) CONFIGURATION FIREBASE  —  À REMPLIR POUR ACTIVER LE PARTAGE
   -------------------------------------------------------------------------
   Tant que ce bloc contient "COLLE_TA_CLE_ICI", l'appli tourne en MODE DÉMO
   (stockage local, non partagé). Voir les instructions sous le code.
   ========================================================================= */
const firebaseConfig = {
  apiKey:            "AIzaSyAdOr-Rmkkn-DFI3ZgmOiJgadbcqTWkgCk",
  authDomain:        "onvareussirnotreexamen.firebaseapp.com",
  projectId:         "onvareussirnotreexamen",
  storageBucket:     "onvareussirnotreexamen.firebasestorage.app",
  messagingSenderId: "209301098920",
  appId:             "1:209301098920:web:615204e877610991db8d9d",
  measurementId:     "G-R77QEX3CQ7"
};
const FIREBASE_ON = !firebaseConfig.apiKey.includes("COLLE_TA_CLE_ICI");

/* Code d'accès à l'entrée (modifiable). Empêche les visiteurs de passage
   d'entrer si le lien fuite. Note : ce n'est pas un coffre-fort. */
const ACCESS_CODE = "REL2026";

/* Les 4 catégories de l'examen, avec leur couleur d'intercalaire */
const ECFS = [
  { id:"ECF1", label:"ECF 1", color:"#3E78C9" },
  { id:"ECF2", label:"ECF 2", color:"#2F9D9B" },
  { id:"ECF3", label:"ECF 3", color:"#E0892B" },

  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const fs = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
  const app = initializeApp(firebaseConfig);
  const db  = fs.getFirestore(app);
  const col = fs.collection(db, "fiches");
  const logCol = fs.collection(db, "activite");
  const log = (type, f) => fs.addDoc(logCol, {
    type, titre:f.titre||"Sans titre", ecf:f.ecf||"", auteur:userName||"anonyme", at:fs.serverTimestamp()
  }).catch(e => console.warn("log", e));
  store = {
    mode:"live",
    subscribe(cb){
      const q = fs.query(col, fs.orderBy("updatedAt","desc"));
      return fs.onSnapshot(q,
        snap => cb(snap.docs.map(d => ({ id:d.id, ...d.data() }))),
        err => { console.error(err); showBanner("Connexion Firebase impossible. Vérifie ta config et tes règles Firestore."); });
    },
    subscribeLog(cb){
      const q = fs.query(logCol, fs.orderBy("at","desc"), fs.limit(60));
      return fs.onSnapshot(q, snap => cb(snap.docs.map(d => ({ id:d.id, ...d.data() }))), e => console.warn(e));
    },
    async add(data){ const r = await fs.addDoc(col, { ...data, createdAt:fs.serverTimestamp(), updatedAt:fs.serverTimestamp() }); log("create", data); return r; },
    async update(id,data){ await fs.updateDoc(fs.doc(db,"fiches",id), { ...data, updatedAt:fs.serverTimestamp() }); log("update", data); },
    async remove(id, meta={}){ await fs.deleteDoc(fs.doc(db,"fiches",id)); log("delete", meta); }
  };
} else {
  const KEY = "leclasseur.fiches", LKEY = "leclasseur.activite";
  const read     = () => { try { return JSON.parse(localStorage.getItem(KEY)  || "[]"); } catch { return []; } };
  const readLog  = () => { try { return JSON.parse(localStorage.getItem(LKEY) || "[]"); } catch { return []; } };
  const write    = (a) => localStorage.setItem(KEY,  JSON.stringify(a));
  const writeLog = (a) => localStorage.setItem(LKEY, JSON.stringify(a.slice(-60)));
  let listener = null, logListener = null;
  const notify    = () => listener    && listener(read().sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)));
  const notifyLog = () => logListener && logListener(readLog().slice().sort((a,b)=>(b.at||0)-(a.at||0)));
  const onStorage = () => { notify(); notifyLog(); };
  const log = (type, f) => { const a = readLog(); a.push({ id:"lg_"+Date.now()+Math.random().toString(36).slice(2,5), type, titre:f.titre||"Sans titre", ecf:f.ecf||"", auteur:userName||"anonyme", at:Date.now() }); writeLog(a); notifyLog(); };
  store = {
    mode:"demo",
    subscribe(cb){ listener = cb; notify(); window.addEventListener("storage", onStorage);
      return () => { listener=null; window.removeEventListener("storage", onStorage); }; },
    subscribeLog(cb){ logListener = cb; notifyLog(); return () => { logListener=null; }; },
    async add(data){ const a=read(); a.push({ id:"loc_"+Date.now()+Math.random().toString(36).slice(2,6), ...data, createdAt:Date.now(), updatedAt:Date.now() }); write(a); notify(); log("create", data); },
    async update(id,data){ write(read().map(f => f.id===id ? { ...f, ...data, updatedAt:Date.now() } : f)); notify(); log("update", data); },
    async remove(id, meta={}){ write(read().filter(f => f.id!==id)); notify(); log("delete", meta); }
  };
}

/* --- Conversion d'un tableau Excel en tableau Markdown --- */
function rowsToMd(rows){
  rows = rows.filter(r => r && r.some(c => String(c??"").trim() !== ""));
  if(!rows.length) return "";
  const width = Math.max(...rows.map(r => r.length));
  const cell  = (v) => String(v??"").replace(/\|/g,"\\|").replace(/\r?\n/g," ").trim();
  const norm  = (r) => { const a=r.slice(); while(a.length<width) a.push(""); return a; };
  let md = "| " + norm(rows[0]).map(cell).join(" | ") + " |\n";
  md    += "| " + Array(width).fill("---").join(" | ") + " |\n";
  for(let i=1;i<rows.length;i++) md += "| " + norm(rows[i]).map(cell).join(" | ") + " |\n";
  return md;
}

/* --- Import Word / Excel / PowerPoint → { titre, contenu(markdown) } --- */
async function importFile(file){
  const base = file.name.replace(/\.[^.]+$/,"");
  const ext  = (file.name.split(".").pop() || "").toLowerCase();

  if(ext === "docx"){
    const arrayBuffer = await file.arrayBuffer();
    // On ignore les images : inexploitables en fiche texte et elles font exploser la taille.
    const res = await mammoth.convertToHtml({ arrayBuffer }, {
      convertImage: mammoth.images.imgElement(() => ({ src:"" }))
    });
    let md = turndown.turndown(res.value || "").replace(/!\[[^\]]*\]\(\)/g, "").replace(/\n{3,}/g, "\n\n").trim();
    return { titre:base, contenu: md || "_Document vide._" };
  }

  if(["xlsx","xls","csv"].includes(ext)){
    const wb = XLSX.read(await file.arrayBuffer(), { type:"array" });
    let md = "";
    wb.SheetNames.forEach(sn => {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { header:1, blankrows:false });
      const tbl = rowsToMd(rows);
      if(!tbl) return;
      if(wb.SheetNames.length > 1) md += `## ${sn}\n\n`;
      md += tbl + "\n\n";
    });
    return { titre:base, contenu: md.trim() || "_Feuille vide._" };
  }

  if(ext === "pptx"){
    const zip = await JSZip.loadAsync(await file.arrayBuffer());
    const slides = Object.keys(zip.files)
      .filter(n => /^ppt\/slides\/slide\d+\.xml$/.test(n))
      .sort((a,b) => (a.match(/(\d+)/)[1]-0) - (b.match(/(\d+)/)[1]-0));
    let md = "", n = 0;
    for(const sf of slides){
      n++;
      const xml = await zip.files[sf].async("string");
      const paras = xml.split(/<a:p[ >]/).slice(1).map(p => {
        const t = [...p.matchAll(/<a:t>([\s\S]*?)<\/a:t>/g)].map(m => m[1]).join("")
          .replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;/g,"'").trim();
        return t;
      }).filter(Boolean);
      if(!paras.length) continue;
      md += `## Diapositive ${n}\n\n` + paras.map((p,i) => i===0 ? `**${p}**` : `- ${p}`).join("\n") + "\n\n";
    }
    return { titre:base, contenu: md.trim() || "_Diapositives sans texte (contenu surtout visuel)._" };
  }

  throw new Error(`Format « .${ext} » non pris en charge. Utilise .docx, .xlsx ou .pptx.`);
}

/* --- Pièces jointes (fichier d'origine stocké en base64 dans la fiche) --- */
const MAX_ATTACH = 600 * 1024; // ~600 Ko (la fiche entière doit rester sous 1 Mo dans Firestore)
function fileToB64(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Lecture du fichier impossible"));
    r.readAsDataURL(file);
  });
}
function fmtSize(b){ return b < 1024 ? b+" o" : b < 1048576 ? (b/1024).toFixed(0)+" Ko" : (b/1048576).toFixed(1)+" Mo"; }
function downloadFile(att){
  const bin = atob(att.data), bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  const url = URL.createObjectURL(new Blob([bytes], { type: att.mime || "application/octet-stream" }));
  const a = document.createElement("a");
  a.href = url; a.download = att.name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

function modal(html){
  const o = document.createElement("div");
  o.className = "overlay";
  o.innerHTML = `<div class="modal">${html}</div>`;
  o.addEventListener("click", e => { if(e.target===o) close(); });
  function escClose(e){ if(e.key==="Escape") close(); }
  function close(){ o.remove(); document.removeEventListener("keydown", escClose); }
  document.addEventListener("keydown", escClose);
  o.close = close; document.body.appendChild(o); return o;
}

let activityLog = [];
const atMillis = (v) => !v ? 0 : (typeof v==="number" ? v : (v.toMillis ? v.toMillis() : (v.toDate ? v.toDate().getTime() : 0)));
const lastSeen = () => Number(localStorage.getItem("leclasseur.actSeen") || 0);
function relTime(v){
  const t = atMillis(v); if(!t) return "";
  const s = Math.floor((Date.now()-t)/1000);
  if(s < 50)    return "à l'instant";
  if(s < 3600)  return "il y a " + Math.floor(s/60) + " min";
  if(s < 86400) return "il y a " + Math.floor(s/3600) + " h";
  if(s < 172800)return "hier";
  return new Date(t).toLocaleDateString("fr-FR", { day:"2-digit", month:"short" });
}
const ACT = {
  create:{ verb:"a ajouté",   color:"#5BA85B", icon:`<path d="M12 5v14M5 12h14"/>` },
  update:{ verb:"a modifié",  color:"#E0892B", icon:`<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>` },
  delete:{ verb:"a supprimé", color:"#C8463E", icon:`<path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>` }
};
function refreshBadge(){
  const b = $("actBadge"); if(!b) return;
  const n = activityLog.filter(e => atMillis(e.at) > lastSeen() && (e.auteur||"") !== (userName||"")).length;
  if(n > 0){ b.hidden = false; b.textContent = n > 9 ? "9+" : String(n); }
  else b.hidden = true;
}
function openActivity(){
  const seen = lastSeen();
  const rows = activityLog.slice(0, 60).map(e => {
    const a = ACT[e.type] || ACT.update;
    const isNew = atMillis(e.at) > seen;
    return `<div class="log-item ${isNew?'new':''}">
      <span class="log-ic" style="background:${a.color}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${a.icon}</svg></span>
      <div class="log-tx"><b>${esc(e.auteur||"anonyme")}</b> ${a.verb} <span class="ti">« ${esc(e.titre||"Sans titre")} »</span>${e.ecf?`<span class="log-ecf">${esc(ecfLabel(e.ecf))}</span>`:""}
        <div class="log-time">${relTime(e.at)}</div></div>
    </div>`;
  }).join("");
  const body = rows
    ? `<div class="log-legend"><span class="sw"></span> les nouveautés depuis ta dernière visite sont surlignées</div><div class="log-list">${rows}</div>`
    : `<div class="empty"><div class="big">Rien pour l'instant</div><p>Les créations, modifications et suppressions de fiches apparaîtront ici.</p></div>`;
  const o = modal(`
    <div class="modal-head"><h2>Activité récente</h2><button class="x" data-x>${closeIcon}</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot"><span></span><div class="right"><button class="btn btn-primary" data-x>Fermer</button></div></div>`);
  o.querySelectorAll("[data-x]").forEach(b => b.onclick = o.close);
  localStorage.setItem("leclasseur.actSeen", String(Date.now()));
  refreshBadge();
}

/* --- Import en masse (plusieurs fichiers → une fiche par fichier) --- */
function openImport(){
  if(!userName){ askName(); return; }
  let batchEcf = filter !== "__all__" ? filter : "ECF1";
  let rows = [];
  const pills = ECFS.map(e =>
    `<button type="button" class="ecf-pill ${batchEcf===e.id?'on':''}" data-ecf="${e.id}" style="--ec:${e.color}"><span class="dot"></span>${e.label}</button>`).join("");
  const o = modal(`
    <div class="modal-head"><h2>Importer des fichiers</h2><button class="x" data-x>${closeIcon}</button></div>
    <div class="modal-body">
      <div class="field-label">ECF par défaut</div>
      <div class="ecf-pick" id="impEcf">${pills}</div>
      <div class="import-zone">
        <div class="txt"><b>Word, Excel ou PowerPoint.</b> Choisis autant de fichiers que tu veux : une fiche est créée par fichier (le texte est extrait, les images sont ignorées). Tu peux ajuster l'ECF de chaque fichier dans la liste.</div>
        <button type="button" class="btn btn-ghost" id="impPick">Choisir des fichiers</button>
        <input type="file" id="impFiles" accept=".docx,.xlsx,.xls,.csv,.pptx" multiple hidden>
      </div>
      <div class="imp-list" id="impList"></div>
      <div id="impProg" class="hint"></div>
    </div>
    <div class="modal-foot">
      <span class="hint" id="impCount">Aucun fichier sélectionné</span>
      <div class="right">
        <button class="btn btn-ghost" data-x>Fermer</button>
        <button class="btn btn-primary" id="impGo" disabled>Importer</button>
      </div>
    </div>`);

  const list = o.querySelector("#impList"), go = o.querySelector("#impGo"),
        cnt  = o.querySelector("#impCount"), prog = o.querySelector("#impProg"),
        input = o.querySelector("#impFiles");
  const typeTag = (name) => {
    const e = (name.split(".").pop()||"").toLowerCase();
    if(e==="docx") return { t:"DOC", c:"#3E78C9" };
    if(e==="pptx") return { t:"PPT", c:"#E0892B" };
    return { t:"XLS", c:"#5BA85B" };
  };
  function renderList(){
    list.innerHTML = rows.map((r,i) => {
      const tg = typeTag(r.file.name);
      const opts = ECFS.map(e => `<option value="${e.id}" ${e.id===r.ecf?'selected':''}>${e.label}</option>`).join("");
      return `<div class="imp-row" data-i="${i}">
        <span class="imp-ic" style="background:${tg.c}">${tg.t}</span>
        <span class="imp-name">${esc(r.file.name)}</span>
        <select class="imp-sel" data-i="${i}">${opts}</select>
      </div>`;
    }).join("");
    list.querySelectorAll(".imp-sel").forEach(s => s.onchange = () => { rows[+s.dataset.i].ecf = s.value; });
    cnt.textContent = rows.length ? `${rows.length} fichier(s) prêt(s)` : "Aucun fichier sélectionné";
    go.disabled = rows.length === 0;
    go.textContent = rows.length ? `Importer ${rows.length} fiche(s)` : "Importer";
  }

  o.querySelectorAll("[data-x]").forEach(b => b.onclick = o.close);
  o.querySelector("#impPick").onclick = () => input.click();
  input.onchange = () => { rows = [...input.files].map(f => ({ file:f, ecf:batchEcf })); renderList(); };
  o.querySelectorAll(".ecf-pill").forEach(p => p.onclick = () => {
    batchEcf = p.dataset.ecf;
    o.querySelectorAll(".ecf-pill").forEach(x => x.classList.toggle("on", x.dataset.ecf===batchEcf));
    rows.forEach(r => r.ecf = batchEcf);
    renderList();
  });

  go.onclick = async () => {
    go.disabled = true; input.disabled = true;
    let ok = 0, fail = 0;
    for(let i=0;i<rows.length;i++){
      const rowEl = list.querySelector(`.imp-row[data-i="${i}"]`);
      prog.textContent = `Import ${i+1}/${rows.length} : ${rows[i].file.name}…`;
      try{
        const r = await importFile(rows[i].file);
        await store.add({ titre:r.titre, ecf:rows[i].ecf, theme:"", contenu:r.contenu, auteur:userName||"anonyme" });
        if(rowEl) rowEl.classList.add("done"); ok++;
      }catch(e){
        console.warn("import", rows[i].file.name, e);
        if(rowEl) rowEl.classList.add("fail"); fail++;
      }
    }
    prog.innerHTML = `<span style="color:var(--accent)">✓ ${ok} fiche(s) importée(s)${fail?` · ${fail} échec(s)`:""}.</span>`;
    go.textContent = "Terminé";
    setTimeout(() => o.close(), fail ? 2800 : 1100);
  };
}

/* =========================================================================
   7) ÉCRAN DE VERROUILLAGE + DÉMARRAGE
   ========================================================================= */
function startApp(){
  $("whoLabel").textContent = userName || "—";
  $("changeName").onclick = () => askName(true);
  $("newCard").onclick = () => { if(!userName){ askName(); return; } openEdit(); };
  $("importBtn").onclick = openImport;
  $("actBtn").onclick = openActivity;
  $("search").addEventListener("input", e => { searchTerm = e.target.value; renderGrid(); });

  renderBanner();
  store.subscribe(data => { fiches = data; renderTabs(); renderGrid(); });
  store.subscribeLog(data => { activityLog = data; refreshBadge(); });
  if(!userName) askName();
}

function gate(){
  const o = document.createElement("div");
  o.className = "overlay";
  o.style.alignItems = "center";
  o.innerHTML = `<div class="modal" style="max-width:400px">
    <div class="modal-body" style="text-align:center; padding:34px 28px">
      <div style="font-family:var(--font-display); font-weight:700; font-size:30px; letter-spacing:-.01em">
        Le <em style="font-style:italic; color:var(--accent)">Classeur</em></div>
      <p style="color:var(--ink-soft); font-size:14px; margin:8px 0 22px; line-height:1.5">
        Espace réservé à la classe.<br>Entre le code d'accès pour continuer.</p>
      <input class="input" id="gateInput" type="password" placeholder="Code d'accès"
        style="text-align:center; letter-spacing:.1em" autocomplete="off">
      <div id="gateErr" class="hint" style="color:var(--danger); min-height:16px; margin-top:8px"></div>
      <button class="btn btn-primary" id="gateBtn" style="width:100%; justify-content:center; margin-top:6px">Entrer</button>
    </div></div>`;
  document.body.appendChild(o);

  const input = o.querySelector("#gateInput");
  const err   = o.querySelector("#gateErr");
  const tryUnlock = () => {
    if(input.value === ACCESS_CODE){
      o.remove();
      startApp();
    } else {
      err.textContent = "Code incorrect.";
      input.value = "";
      input.style.borderColor = "var(--danger)";
      input.focus();
    }
  };
  setTimeout(() => input.focus(), 50);
  o.querySelector("#gateBtn").onclick = tryUnlock;
  input.addEventListener("keydown", e => { if(e.key==="Enter") tryUnlock(); });
  input.addEventListener("input", () => { input.style.borderColor=""; err.textContent=""; });
}

gate();
</script>
